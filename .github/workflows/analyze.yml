name: Analyze Dylib File From Link

on:
  workflow_dispatch: # ڕێگەت پێدەدات بە دەستی خۆت لینکەکە بنووسیت و ڕەنی بکەیت
    inputs:
      dylib_url:
        description: 'لینکە ڕاستەوخۆکەی فایلی .dylib لێرە دابنێ'
        required: true
        type: string

jobs:
  analyze-dylib:
    runs-on: macos-latest # بەکارهێنانی ماک بۆ کارکردنی دروستی nm و strings
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Dylib from Link
      run: |
        URL="${{ github.event.inputs.dylib_url }}"
        
        # دەرهێنانی ناوی ڕاستەقینەی فایلەکە لە کۆتایی لینکەکەوە
        FILENAME=$(basename "$URL" | cut -d? -f1)
        
        # ئەگەر پاشکۆی .dylib بەستراو نەبوو، ناوێکی جێگیری دەدەینێ تا کۆدەکە نەوەستێت
        if [[ "$FILENAME" != *.dylib ]]; then
          FILENAME="downloaded_file.dylib"
        fi
        
        echo "داگرتنی فایل لە ناونیشانی: $URL"
        curl -L -o "$FILENAME" "$URL"
        echo "فایلەکە بە سەرکەوتوویی دابەزی وەک: $FILENAME"

    - name: Process Dylib and Extract Human-Readable Data
      run: |
        mkdir -p analysis_results
        
        for file in *.dylib; do
          if [ -f "$file" ]; then
            echo "کاردەکات لەسەر شیکردنەوەی: $file"
            output_file="analysis_results/${file}_readable.txt"
            
            echo "=========================================" > "$output_file"
            echo "زانیاری گشتی دەربارەی فایلەکە:" >> "$output_file"
            echo "=========================================" >> "$output_file"
            file "$file" >> "$output_file"
            
            echo -e "\n=========================================" >> "$output_file"
            echo "فەنکشنەکان و ناوەکانی ناو کۆدەکە (Symbols):" >> "$output_file"
            echo "=========================================" >> "$output_file"
            nm -gU "$file" >> "$output_file" || echo "هیچ هێمایەک نەدۆزرایەوە (ڕەنگە سڕابێتەوە/Stripped)" >> "$output_file"
            
            echo -e "\n=========================================" >> "$output_file"
            echo "دەقە تێگەیشتووەکانی ناو باینەرییەکە (Strings):" >> "$output_file"
            echo "=========================================" >> "$output_file"
            strings "$file" | grep -E '^[a-zA-Z0-9_\.\-\/ ]{4,100}$' | sort -u >> "$output_file"
          fi
        done

    - name: Upload Analysis Results
      uses: actions/upload-artifact@v4
      with:
        name: Dylib-Human-Readable-Report
        path: analysis_results/
